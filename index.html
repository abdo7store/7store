<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Store 🔥</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{margin:0;font-family:Arial;background:#020617;color:white}
.header{padding:20px;text-align:center;font-size:24px;font-weight:bold}
.container{padding:15px}
.card{background:#1e293b;border-radius:15px;padding:15px;margin:10px 0}
.card img{width:100%;border-radius:10px}
.price{font-size:20px;color:#22c55e;margin:10px 0}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#22c55e;color:white}
input{width:90%;padding:10px;margin:5px;border-radius:8px;border:none}
.hidden{display:none}
.admin{background:#111827;padding:10px;margin-top:20px}
</style>

</head>
<body>

<div class="header">🔥 7 Store</div>

<!-- LOGIN -->
<div id="auth" class="container">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- STORE -->
<div id="store" class="container hidden">

<div class="card">
<img src="https://i.imgur.com/1Xq9biB.jpg">
<h3>PUBG UC</h3>
<div class="price" id="price_pubg">50</div>
<button onclick="order('PUBG')">شراء</button>
</div>

<div class="card">
<img src="https://i.imgur.com/UYiroys.jpg">
<h3>Free Fire</h3>
<div class="price" id="price_ff">40</div>
<button onclick="order('FF')">شراء</button>
</div>

<button onclick="logout()">Logout</button>
<button onclick="showAdmin()">Admin</button>

</div>

<!-- ADMIN -->
<div id="admin" class="container hidden">

<h2>⚙️ Admin Panel</h2>

<input id="pubg" placeholder="PUBG price">
<input id="ff" placeholder="FF price">
<button onclick="savePrices()">Save Prices</button>

<h3>📦 Orders</h3>
<div id="orders"></div>

</div>

<script>

var firebaseConfig = {
  apiKey: "PUT KEY",
  authDomain: "store7-b988b.firebaseapp.com",
  databaseURL: "https://store7-b988b-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.database();

// login
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value);
}

// auth
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("store").classList.remove("hidden");
  }
});

// order
function order(game){
  let id=prompt("ID بتاعك");
  db.ref("orders").push({
    game,id,user:auth.currentUser.uid,status:"جديد"
  });
  alert("تم الطلب 🔥");
}

// logout
function logout(){
  auth.signOut();
}

// admin
function showAdmin(){
  document.getElementById("store").classList.add("hidden");
  document.getElementById("admin").classList.remove("hidden");
}

// save prices
function savePrices(){
  db.ref("prices").set({
    pubg:pubg.value,
    ff:ff.value
  });
}

// load prices
db.ref("prices").on("value",s=>{
  let p=s.val()||{pubg:50,ff:40};
  document.getElementById("price_pubg").innerText=p.pubg+" EGP";
  document.getElementById("price_ff").innerText=p.ff+" EGP";
});

// orders
db.ref("orders").on("value",s=>{
  let data=s.val(),html="";
  for(let k in data){
    let o=data[k];
    html+=`
    <div class="admin">
    ${o.game} - ${o.id} - ${o.status}
    <button onclick="done('${k}')">✔️ تم</button>
    </div>`;
  }
  document.getElementById("orders").innerHTML=html;
});

// done
function done(id){
  db.ref("orders/"+id).update({status:"تم"});
}

</script>

</body>
</html>
